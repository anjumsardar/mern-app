name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/anjumsardar/frontend-image:latest
            ghcr.io/anjumsardar/frontend-image:${{ github.run_number }}

      - name: Update k8s frontend image
        run: |
          sed -i "s|image: .*frontend-image.*|image: ghcr.io/anjumsardar/frontend-image:${{ github.run_number }}|g" k8s/client.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/client.yaml
          git commit -m "Update frontend image to run ${{ github.run_number }}" || exit 0
          git push